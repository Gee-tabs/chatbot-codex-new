<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F7F8FB"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0B1220" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1400" height="900" rx="28" fill="url(#bg)"/>

  <!-- Outer container -->
  <g filter="url(#shadow)">
    <rect x="140" y="80" width="1120" height="740" rx="28" fill="url(#panel)" stroke="#E5E7EB"/>
  </g>

  <!-- Header -->
  <text x="180" y="135" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#111827">AI Avatar Chatbot</text>
  <text x="1040" y="135" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0F766E">Crystal Prompter</text>

  <!-- Left avatar panel -->
  <rect x="180" y="170" width="520" height="420" rx="22" fill="#F9FAFB" stroke="#E5E7EB"/>
  <rect x="210" y="200" width="460" height="360" rx="18" fill="#0B1220"/>
  <circle cx="440" cy="320" r="70" fill="#F8FAFC"/>
  <rect x="410" y="410" width="120" height="12" rx="6" fill="#CBD5F5"/>
  <text x="400" y="520" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="18" fill="#E5E7EB">Avatar</text>

  <!-- Right prompter panel -->
  <rect x="740" y="170" width="440" height="420" rx="22" fill="#F9FAFB" stroke="#E5E7EB"/>
  <rect x="780" y="220" width="360" height="40" rx="20" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="780" y="280" width="360" height="40" rx="20" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="780" y="340" width="360" height="40" rx="20" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="780" y="400" width="360" height="40" rx="20" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="780" y="460" width="360" height="40" rx="20" fill="#FFFFFF" stroke="#E5E7EB"/>

  <text x="1145" y="245" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="14" fill="#475569">Text</text>
  <text x="1145" y="305" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="14" fill="#475569">Photos</text>
  <text x="1145" y="365" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="14" fill="#475569">Slides</text>
  <text x="1145" y="425" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="14" fill="#475569">Videos</text>
  <text x="1145" y="485" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="14" fill="#475569">3D Modeling</text>

  <line x1="1040" y1="236" x2="1120" y2="236" stroke="#94A3B8" stroke-width="2"/>
  <line x1="1040" y1="296" x2="1120" y2="296" stroke="#94A3B8" stroke-width="2"/>
  <line x1="1040" y1="356" x2="1120" y2="356" stroke="#94A3B8" stroke-width="2"/>
  <line x1="1040" y1="416" x2="1120" y2="416" stroke="#94A3B8" stroke-width="2"/>
  <line x1="1040" y1="476" x2="1120" y2="476" stroke="#94A3B8" stroke-width="2"/>

  <!-- Example chips row -->
  <rect x="180" y="620" width="1000" height="70" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="210" y="638" width="150" height="34" rx="17" fill="#F1F5F9" stroke="#E2E8F0"/>
  <rect x="380" y="638" width="150" height="34" rx="17" fill="#F1F5F9" stroke="#E2E8F0"/>
  <rect x="550" y="638" width="150" height="34" rx="17" fill="#F1F5F9" stroke="#E2E8F0"/>
  <rect x="720" y="638" width="150" height="34" rx="17" fill="#F1F5F9" stroke="#E2E8F0"/>
  <rect x="890" y="638" width="150" height="34" rx="17" fill="#F1F5F9" stroke="#E2E8F0"/>

  <text x="245" y="660" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="12" fill="#64748B">Example</text>
  <text x="415" y="660" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="12" fill="#64748B">Example</text>
  <text x="585" y="660" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="12" fill="#64748B">Example</text>
  <text x="755" y="660" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="12" fill="#64748B">Example</text>
  <text x="925" y="660" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="12" fill="#64748B">Example</text>

  <!-- Input bar -->
  <rect x="180" y="710" width="1000" height="80" rx="22" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="210" y="755" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="18" fill="#94A3B8">Ask Anything</text>
  <circle cx="1140" cy="750" r="22" fill="url(#accent)"/>
  <polygon points="1133,740 1148,750 1133,760" fill="#FFFFFF"/>

  <!-- Label for 190px in sketch -->
  <text x="100" y="360" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="14" fill="#64748B">190 px</text>
</svg>
